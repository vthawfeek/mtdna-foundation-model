name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check mtdna_fm/ tests/
      - name: Ruff format check
        run: uv run ruff format --check mtdna_fm/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest tests/ -m "not slow and not integration" --cov=mtdna_fm --cov-report=term-missing
